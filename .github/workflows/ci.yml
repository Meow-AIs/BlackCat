name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install GCC (for CGo)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run tests
        run: CGO_ENABLED=1 go test ./... -count=1 -short -timeout 120s

      - name: Run vet
        run: go vet ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build binary
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o blackcat ./cmd/blackcat/

      - name: Check binary size
        run: |
          SIZE=$(stat -f%z blackcat 2>/dev/null || stat -c%s blackcat)
          echo "Binary size: $((SIZE / 1024 / 1024))MB"
          if [ "$SIZE" -gt 18874368 ]; then
            echo "WARNING: Binary exceeds 18MB target"
          fi
